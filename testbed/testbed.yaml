testbed:
  name: pyATS_CML_Lab
  credentials:
    default:
      username: admin
      password: "%ENV{LAB_PASSWORD}"  # set env var LAB_PASSWORD to avoid hardcoding

devices:

  R1:
    alias: R1
    type: router
    os: iosxe
    platform: csr1000v
    credentials:
      default:
        username: admin
        password: "%ENV{LAB_PASSWORD}"
    connections:
      defaults:
        class: unicon.Unicon
      cli:
        protocol: ssh
        ip: 172.21.1.21

  R2:
    alias: R2
    type: router
    os: iosxe
    platform: csr1000v
    credentials:
      default:
        username: admin
        password: "%ENV{LAB_PASSWORD}"
    connections:
      defaults:
        class: unicon.Unicon
      cli:
        protocol: ssh
        ip: 172.21.1.22

  R3:
    alias: R3
    type: router
    os: iosxe
    platform: csr1000v
    credentials:
      default:
        username: admin
        password: "%ENV{LAB_PASSWORD}"
    connections:
      defaults:
        class: unicon.Unicon
      cli:
        protocol: ssh
        ip: 172.21.1.23

  c8:
    alias: c8
    type: router
    os: iosxe
    platform: cat8000v
    credentials:
      default:
        username: admin
        password: "%ENV{LAB_PASSWORD}"
    connections:
      defaults:
        class: unicon.Unicon
      cli:
        protocol: ssh
        ip: 172.21.1.24

topology:
  R1:
    interfaces:
      GigabitEthernet1:
        alias: mgmt
        ipv4: 172.21.1.21/24
        link: mgmt-switch
      GigabitEthernet2:
        alias: to_R2
        ipv4: 10.0.12.1/30
        link: link_R1_R2
      GigabitEthernet3:
        alias: to_R3
        ipv4: 10.0.13.1/30
        link: link_R1_R3

  R2:
    interfaces:
      GigabitEthernet1:
        alias: mgmt
        ipv4: 172.21.1.22/24
        link: mgmt-switch
      GigabitEthernet2:
        alias: to_R1
        ipv4: 10.0.12.2/30
        link: link_R1_R2
      GigabitEthernet3:
        alias: to_R3
        ipv4: 10.0.23.1/30
        link: link_R2_R3

  R3:
    interfaces:
      GigabitEthernet1:
        alias: mgmt
        ipv4: 172.21.1.23/24
        link: mgmt-switch
      GigabitEthernet2:
        alias: to_R1
        ipv4: 10.0.13.2/30
        link: link_R1_R3
      GigabitEthernet3:
        alias: to_R2
        ipv4: 10.0.23.2/30
        link: link_R2_R3

  c8:
    interfaces:
      GigabitEthernet1:
        alias: mgmt
        ipv4: 172.21.1.24/24
        link: mgmt-switch
